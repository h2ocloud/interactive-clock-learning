<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>互動式時鐘理解工具</title>
  <style>
    :root{
      --bg:#f3efe9; --card:#fffaf6; --ink:#5a5660; --muted:#8a8790;
      --accent:#87CEEB; --accent2:#FFC72C; --accent3:#b5b0d6; --line:#d8d1c8;
      --ok:#87a989;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:"Noto Sans TC",system-ui;background:linear-gradient(140deg,#f5f0ea,#edf1f2);color:var(--ink);overscroll-behavior:none}
    .wrap{max-width:1080px;margin:0 auto;padding:16px}
    .title{font-size:28px;font-weight:800}
    .sub{color:var(--muted);margin:6px 0 14px}
    .grid{display:grid;grid-template-columns:420px 1fr;gap:16px}
    .card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;box-shadow:0 2px 10px #0000000f}
    .controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
    button,select,input{border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:#fff;color:var(--ink);font-weight:700}
    button{cursor:pointer}
    .digital{font-size:36px;font-weight:800;letter-spacing:1px;text-align:center;margin:10px 0;color:#6d6b76}
    .row{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .pill{background:#f7f3ee;border:1px solid var(--line);border-radius:12px;padding:10px}
    .pill b{display:block;font-size:22px;color:#6a7180}
    .legend{font-size:13px;color:var(--muted)}
    canvas{width:100%;height:auto;display:block;touch-action:none}
    .sec h3{margin:0 0 8px}
    .base-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    .base{background:#f8f5f1;border:1px dashed #d5cec4;border-radius:12px;padding:10px}
    .base h4{margin:0 0 6px}
    .base .v{font-size:24px;font-weight:800}
    .hint{margin-top:10px;padding:10px;background:#eef4f2;border:1px solid #d1ddd8;border-radius:10px;color:#60706d}
    .ring-anim{animation:ringPulse .45s ease}
    @keyframes ringPulse{0%{transform:scale(1);box-shadow:0 0 0 0 #ffd54a88}50%{transform:scale(1.03);box-shadow:0 0 0 10px #ffd54a22}100%{transform:scale(1);box-shadow:none}}
    @media(max-width:960px){.grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="title">🕰️ 互動式時鐘理解工具</div>
    <div class="sub">可切換 12/24 小時制、拖曳分針互動，搭配數位時鐘與進位概念（60/12/24）教學。</div>

    <div class="grid">
      <div class="card">
        <canvas id="clock" width="380" height="380"></canvas>
        <div class="controls" style="margin-top:10px">
          <label>顯示制式
            <select id="mode"><option value="12">12 小時制</option><option value="24">24 小時制</option></select>
          </label>
          <button id="setNow">設為現在</button>
          <button id="add5">+5 分</button>
          <button id="sub5">-5 分</button>
        </div>
        <div class="digital" id="digital">--:--</div>
        <div class="row">
          <div class="pill">目前小時<b id="hourVal">-</b></div>
          <div class="pill">目前分鐘<b id="minVal">-</b></div>
        </div>
        <div class="pill" id="ringBox" style="margin-top:10px;background:#efe8f8;border-color:#d3c6ea;display:none">24 小時圈數：<b id="ringVal">第 1 圈（0-12）</b></div>
        <div class="hint">操作方式：用滑鼠/手指拖曳「分針」即可調整時間，時針會依真實時鐘比例同步移動。</div>
      </div>

      <div class="card sec">
        <h3>進位與時間概念對照</h3>
        <div class="base-grid">
          <div class="base"><h4>60 進位（分鐘）</h4><div class="v" id="base60">0 / 60</div><div class="legend">一圈 = 60 分鐘</div></div>
          <div class="base"><h4>12 進位（傳統鐘面）</h4><div class="v" id="base12">0 / 12</div><div class="legend">一圈 = 12 小時</div></div>
          <div class="base"><h4>24 進位（一天）</h4><div class="v" id="base24">0 / 24</div><div class="legend">一天 = 24 小時（分兩圈：0-12、13-24）</div></div>
          <div class="base"><h4>24 小時圈數提示</h4><div class="v" id="base24ring">第 1 圈</div><div class="legend">第一圈 0-12；第二圈 13-24</div></div>
        </div>
        <div class="hint" id="concept"></div>
      </div>
    </div>
  </div>

<script>
const cv = document.getElementById('clock');
const ctx = cv.getContext('2d');
const modeSel = document.getElementById('mode');
let time = { h: 9, m: 0 };
let draggingMin = false;
let lastRing = null;

function pad(n){ return String(n).padStart(2,'0'); }
function hour24(){ return ((time.h % 24) + 24) % 24; }
function hour12(){ const h = hour24() % 12; return h===0?12:h; }

function renderClock(){
  const w=cv.width,h=cv.height,cx=w/2,cy=h/2,r=160;
  ctx.clearRect(0,0,w,h);
  // face
  ctx.fillStyle='#fffaf6'; ctx.strokeStyle='#d8d1c8'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill(); ctx.stroke();

  // ticks 60
  for(let i=0;i<60;i++){
    const a = (Math.PI*2)*(i/60)-Math.PI/2;
    const inner = i%5===0 ? r-22 : r-12;
    ctx.strokeStyle = i%5===0 ? '#9fa6b2' : '#c7c3bb';
    ctx.lineWidth = i%5===0 ? 3 : 1.4;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(a)*inner, cy+Math.sin(a)*inner);
    ctx.lineTo(cx+Math.cos(a)*(r-4), cy+Math.sin(a)*(r-4));
    ctx.stroke();
  }

  // numbers (12hr fixed / 24hr ring-based)
  const ring = (hour24()>=13) ? 2 : 1; // 第一圈 1-12；第二圈 13-24
  ctx.fillStyle='#7b7a86'; ctx.font='700 22px system-ui'; ctx.textAlign='center'; ctx.textBaseline='middle';
  for(let i=0;i<12;i++){
    const a = (Math.PI*2)*((i+1)/12)-Math.PI/2;
    const label = modeSel.value==='24' ? (ring===1 ? (i+1) : (i+13)) : (i+1);
    ctx.fillText(String(label), cx+Math.cos(a)*(r-42), cy+Math.sin(a)*(r-42));
  }

  // minute hand (McDonald's yellow)
  const ma = (Math.PI*2)*(time.m/60)-Math.PI/2;
  ctx.strokeStyle='#FFC72C'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ma)*(r-35), cy+Math.sin(ma)*(r-35)); ctx.stroke();

  // hour hand (sky blue)
  const hFrac = (hour24()%12) + time.m/60;
  const ha = (Math.PI*2)*(hFrac/12)-Math.PI/2;
  ctx.strokeStyle='#87CEEB'; ctx.lineWidth=8;
  ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(cx+Math.cos(ha)*(r-72), cy+Math.sin(ha)*(r-72)); ctx.stroke();

  // center
  ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(cx,cy,8,0,Math.PI*2); ctx.fill();
}

function renderText(){
  const mode = modeSel.value;
  const h24 = hour24();
  const hDisplay = mode==='24'?h24:hour12();
  const ampm = mode==='12' ? (h24<12?' AM':' PM') : '';
  document.getElementById('digital').textContent = `${pad(hDisplay)}:${pad(time.m)}${ampm}`;
  document.getElementById('hourVal').textContent = mode==='24' ? `${h24} 時` : `${hour12()} 點${ampm.trim()}`;
  document.getElementById('minVal').textContent = `${time.m} 分`;

  const ring = (h24>=13) ? 2 : 1;
  const ringText = ring===1 ? '第 1 圈（1-12）' : '第 2 圈（13-24）';
  const ringBox = document.getElementById('ringBox');
  document.getElementById('ringVal').textContent = ringText;
  ringBox.style.display = mode==='24' ? 'block' : 'none';
  if(mode==='24' && lastRing!==null && lastRing!==ring){
    ringBox.classList.remove('ring-anim');
    void ringBox.offsetWidth;
    ringBox.classList.add('ring-anim');
  }
  lastRing = ring;

  document.getElementById('base60').textContent = `${time.m} / 60`;
  document.getElementById('base12').textContent = `${((hour24()%12)||12)} / 12`;
  document.getElementById('base24').textContent = `${h24} / 24`;
  document.getElementById('base24ring').textContent = ring===1 ? '第 1 圈（1-12）' : '第 2 圈（13-24）';

  document.getElementById('concept').textContent =
    `教學提示：現在是 ${mode==='24'?`${h24} 點（${ringText}）`:`${hour12()} 點${ampm}`} ${time.m} 分。`+
    ` 分鐘是 60 進位；鐘面小時是 12 進位；一天是 24 小時。`;
}

function render(){ renderClock(); renderText(); }

function setByMinuteAngle(clientX, clientY){
  const rect = cv.getBoundingClientRect();
  const x = (clientX - rect.left) * (cv.width/rect.width);
  const y = (clientY - rect.top) * (cv.height/rect.height);
  const cx=cv.width/2, cy=cv.height/2;
  const a = Math.atan2(y-cy, x-cx); // -PI..PI from +x
  let t = a + Math.PI/2; if(t<0) t += Math.PI*2;
  const newM = Math.round((t/(Math.PI*2))*60)%60;

  const prevM = time.m;
  time.m = newM;
  if(prevM>=50 && newM<=10) time.h = (time.h+1)%24;
  if(prevM<=10 && newM>=50) time.h = (time.h+23)%24;
  render();
}

cv.addEventListener('pointerdown', e=>{ e.preventDefault(); draggingMin=true; cv.setPointerCapture(e.pointerId); setByMinuteAngle(e.clientX,e.clientY); });
cv.addEventListener('pointermove', e=>{ if(draggingMin){ e.preventDefault(); setByMinuteAngle(e.clientX,e.clientY); } });
cv.addEventListener('pointerup', ()=> draggingMin=false);
cv.addEventListener('pointercancel', ()=> draggingMin=false);

modeSel.addEventListener('change', render);
document.getElementById('add5').onclick = ()=>{ time.m+=5; if(time.m>=60){time.m-=60; time.h=(time.h+1)%24;} render(); };
document.getElementById('sub5').onclick = ()=>{ time.m-=5; if(time.m<0){time.m+=60; time.h=(time.h+23)%24;} render(); };
document.getElementById('setNow').onclick = ()=>{ const d=new Date(); time.h=d.getHours(); time.m=d.getMinutes(); render(); };

document.addEventListener('touchmove', (e)=>{ if(draggingMin) e.preventDefault(); }, {passive:false});

render();
</script>
</body>
</html>
